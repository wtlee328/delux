name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using stable Node 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Create environment file
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "VITE_API_BASE_URL=https://delux-plus-staging-488508.web.app" > .env.staging
          else
            echo "VITE_API_BASE_URL=${{ secrets.BACKEND_URL }}" > .env.production
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npm run build:staging
          else
            npm run build:prod
          fi

      - name: Verify build artifacts
        run: |
          echo "Verifying dist folder content..."
          ls -R frontend/dist | head -n 20
          if [ ! -f frontend/dist/index.html ]; then
            echo "Error: index.html not found in frontend/dist"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        run: |
          # Use npx without -g to avoid sudo/path issues in runner
          # Explicitly pass the credentials file produced by the auth action
          export GOOGLE_APPLICATION_CREDENTIALS="${{ steps.auth.outputs.credentials_file_path }}"
          
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npx firebase-tools deploy --only hosting:staging --project delux-plus-staging-488508 --non-interactive --debug
          else
            npx firebase-tools deploy --only hosting:prod --project ${{ secrets.GCP_PROJECT_ID }} --non-interactive --debug
          fi

      - name: Deployment Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Frontend deployed successfully to ${{ github.ref_name }}!"
            URL=${{ github.ref == 'refs/heads/main' && 'https://delux-plus-prod.web.app' || 'https://delux-plus-staging-488508.web.app' }}
            echo "🔗 URL: $URL"
          else
            echo "❌ Deployment failed. Check the 'Deploy to Firebase Hosting' step logs for details."
          fi
