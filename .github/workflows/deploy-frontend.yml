name: Deploy Frontend to Firebase Hosting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create environment file
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "VITE_API_BASE_URL=https://delux-plus-staging-488508.web.app" > .env.staging
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> .env.staging
          else
            echo "VITE_API_BASE_URL=${{ secrets.BACKEND_URL }}" > .env.production
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> .env.production
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npm run build:staging
          else
            npm run build:prod
          fi

      - name: Write Firebase SA key to file
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > "${{ runner.temp }}/firebase-sa-key.json"
          else
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${{ runner.temp }}/firebase-sa-key.json"
          fi

      - name: Deploy to Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="${{ runner.temp }}/firebase-sa-key.json"
          npx firebase-tools deploy \
            --only hosting:${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }} \
            --project ${{ github.ref == 'refs/heads/main' && secrets.GCP_PROJECT_ID || 'delux-plus-staging-488508' }} \
            --non-interactive

      - name: Cleanup SA key
        if: always()
        run: rm -f "${{ runner.temp }}/firebase-sa-key.json"

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Frontend deployed successfully to ${{ github.ref_name }}!"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "🔗 URL: https://delux-plus-prod.web.app"
          else
            echo "🔗 URL: https://delux-plus-staging-488508.web.app"
          fi
          echo "📦 Build: ${{ github.sha }}"
