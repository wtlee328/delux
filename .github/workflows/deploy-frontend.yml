name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Create environment file
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "VITE_API_BASE_URL=https://delux-plus-staging-488508.web.app" > .env.staging
          else
            echo "VITE_API_BASE_URL=${{ secrets.BACKEND_URL }}" > .env.production
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npm run build:staging
          else
            npm run build:prod
          fi

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npx firebase-tools deploy --only hosting:staging --project delux-plus-staging-488508 --non-interactive
          else
            npx firebase-tools deploy --only hosting:prod --project ${{ secrets.GCP_PROJECT_ID }} --non-interactive
          fi

      - name: Deployment Summary
        run: |
          echo "✅ Frontend deployed successfully to ${{ github.ref_name }}!"
          URL=${{ github.ref == 'refs/heads/main' && 'https://delux-plus-prod.web.app' || 'https://delux-plus-staging-488508.web.app' }}
          echo "🔗 URL: $URL"
          echo "📦 Build: ${{ github.sha }}"
