name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    env:
      # Opt into Node.24 to resolve deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Upgraded from 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create environment file
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "VITE_API_BASE_URL=https://delux-plus-backend-staging-ecjhimf22a-de.a.run.app" > .env.staging
          else
            echo "VITE_API_BASE_URL=${{ secrets.BACKEND_URL }}" > .env.production
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            npm run build:staging
          else
            npm run build:prod
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          # Precisely map project IDs based on branch to ensure target matches project
          projectId: ${{ github.ref == 'refs/heads/main' && secrets.GCP_PROJECT_ID || 'delux-plus-staging-488508' }}
          target: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}

      - name: Deployment Summary
        run: |
          echo "✅ Frontend deployed successfully to ${{ github.ref_name }}!"
          URL=${{ github.ref == 'refs/heads/main' && 'https://delux-plus-prod.web.app' || 'https://delux-plus-staging-488508.web.app' }}
          echo "🔗 URL: $URL"
          echo "📦 Build: ${{ github.sha }}"
